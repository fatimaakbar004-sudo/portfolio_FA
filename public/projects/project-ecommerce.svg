<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>E-commerce storefront mockup</title>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12121A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6AEF"/>
      <stop offset="100%" stop-color="#5B4CC4"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB454"/>
      <stop offset="100%" stop-color="#E8933A"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4B4B5E"/>
      <stop offset="100%" stop-color="#2A2A38"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B8AFB"/>
      <stop offset="100%" stop-color="#7C6AEF"/>
    </linearGradient>
    <radialGradient id="blob7" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C6AEF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C6AEF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg4)"/>
  <circle cx="400" cy="80" r="200" fill="url(#blob7)" filter="url(#blur4)"/>

  <rect x="90" y="90" width="260" height="20" rx="6" fill="#1E1E29"/>
  <rect x="610" y="90" width="100" height="24" rx="12" fill="#7C6AEF"/>
  <text x="660" y="106" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#0A0A0F">Cart · 3</text>

  <g>
    <rect x="90" y="150" width="150" height="150" rx="12" fill="url(#card1)"/>
    <rect x="106" y="270" width="90" height="10" rx="5" fill="#0A0A0F" opacity="0.35"/>
    <rect x="106" y="290" width="50" height="10" rx="5" fill="#0A0A0F" opacity="0.35"/>
    <circle cx="215" cy="180" r="14" fill="#0A0A0F" opacity="0.2"/>
  </g>

  <g>
    <rect x="260" y="150" width="150" height="150" rx="12" fill="url(#card2)"/>
    <rect x="276" y="270" width="90" height="10" rx="5" fill="#0A0A0F" opacity="0.35"/>
    <rect x="276" y="290" width="50" height="10" rx="5" fill="#0A0A0F" opacity="0.35"/>
    <circle cx="385" cy="180" r="14" fill="#0A0A0F" opacity="0.2"/>
  </g>

  <g>
    <rect x="430" y="150" width="150" height="150" rx="12" fill="url(#card3)"/>
    <rect x="446" y="270" width="90" height="10" rx="5" fill="#F1F0F7" opacity="0.3"/>
    <rect x="446" y="290" width="50" height="10" rx="5" fill="#F1F0F7" opacity="0.3"/>
    <circle cx="555" cy="180" r="14" fill="#F1F0F7" opacity="0.15"/>
  </g>

  <g>
    <rect x="600" y="150" width="150" height="150" rx="12" fill="url(#card4)"/>
    <rect x="616" y="270" width="90" height="10" rx="5" fill="#0A0A0F" opacity="0.3"/>
    <rect x="616" y="290" width="50" height="10" rx="5" fill="#0A0A0F" opacity="0.3"/>
    <circle cx="725" cy="180" r="14" fill="#0A0A0F" opacity="0.2"/>
  </g>

  <g>
    <rect x="90" y="330" width="150" height="34" rx="8" fill="#0F0F16" stroke="#2A2A38" stroke-width="1.5"/>
    <text x="165" y="352" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#FFB454">$42.00</text>

    <rect x="260" y="330" width="150" height="34" rx="8" fill="#0F0F16" stroke="#2A2A38" stroke-width="1.5"/>
    <text x="335" y="352" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#FFB454">$18.50</text>

    <rect x="430" y="330" width="150" height="34" rx="8" fill="#0F0F16" stroke="#2A2A38" stroke-width="1.5"/>
    <text x="505" y="352" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#FFB454">$76.00</text>

    <rect x="600" y="330" width="150" height="34" rx="8" fill="#0F0F16" stroke="#2A2A38" stroke-width="1.5"/>
    <text x="675" y="352" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#FFB454">$29.99</text>
  </g>

  <g>
    <rect x="90" y="410" width="150" height="36" rx="18" fill="#7C6AEF"/>
    <text x="165" y="433" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#0A0A0F">Add to cart</text>

    <rect x="260" y="410" width="150" height="36" rx="18" fill="#1E1E29" stroke="#7C6AEF" stroke-width="1.5"/>
    <text x="335" y="433" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#B7ACFF">Add to cart</text>

    <rect x="430" y="410" width="150" height="36" rx="18" fill="#1E1E29" stroke="#7C6AEF" stroke-width="1.5"/>
    <text x="505" y="433" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#B7ACFF">Add to cart</text>

    <rect x="600" y="410" width="150" height="36" rx="18" fill="#1E1E29" stroke="#7C6AEF" stroke-width="1.5"/>
    <text x="675" y="433" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#B7ACFF">Add to cart</text>
  </g>
</svg>
