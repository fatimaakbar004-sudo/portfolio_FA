<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Portfolio website browser mockup</title>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12121A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6AEF"/>
      <stop offset="100%" stop-color="#FFB454"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C6AEF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7C6AEF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB454" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFB454" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg1)"/>
  <circle cx="150" cy="120" r="180" fill="url(#blob1)" filter="url(#blur1)"/>
  <circle cx="680" cy="480" r="160" fill="url(#blob2)" filter="url(#blur1)"/>

  <rect x="90" y="110" width="620" height="380" rx="16" fill="#0F0F16" stroke="#2A2A38" stroke-width="1.5"/>

