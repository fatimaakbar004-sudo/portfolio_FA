  <text x="440" y="137" text-anchor="middle" font-family="monospace" font-size="11" fill="#7C7C90">yourname.dev</text>

  <circle cx="400" cy="260" r="42" fill="none" stroke="url(#glow1)" stroke-width="3"/>
